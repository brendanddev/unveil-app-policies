<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Unveil…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .card {
      max-width: 360px;
      width: 100%;
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      font-size: 1rem;
      color: #aaa;
      line-height: 1.5;
    }

    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .fallback p {
      font-size: 0.875rem;
      color: #888;
    }

    .open-btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      background: #fff;
      color: #000;
      border-radius: 999px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .open-btn:hover { opacity: 0.85; }

    .error-msg {
      display: none;
      font-size: 0.875rem;
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Unveil</div>
    <div class="spinner" id="spinner"></div>
    <p class="message" id="message">Opening Unveil…</p>
    <div class="fallback" id="fallback">
      <p>Tap the button below if Unveil didn't open automatically.</p>
      <a class="open-btn" id="open-btn" href="#">Open in Unveil</a>
    </div>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var tokenHash = params.get("token_hash");
      var type = params.get("type");

      var errorEl = document.getElementById("error-msg");
      var fallbackEl = document.getElementById("fallback");
      var openBtn = document.getElementById("open-btn");
      var spinnerEl = document.getElementById("spinner");
      var messageEl = document.getElementById("message");

      if (!tokenHash || !type) {
        spinnerEl.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = "Invalid or missing reset link parameters. Please request a new password reset.";
        return;
      }

      var deepLink =
        "unveil://reset-password?token_hash=" +
        encodeURIComponent(tokenHash) +
        "&type=" +
        encodeURIComponent(type);

      openBtn.href = deepLink;

      // Attempt immediate redirect
      window.location.href = deepLink;

      // Show manual fallback after a short delay — iOS Safari often needs
      // a user gesture to open custom schemes, so the auto-redirect may fail silently
      setTimeout(function () {
        spinnerEl.style.display = "none";
        messageEl.textContent = "Didn't open automatically?";
        fallbackEl.style.display = "flex";
      }, 2000);
    })();
  </script>
</body>
</html>
